name: Build & Release APK

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      api_base_url:
        description: 'API Base URL (e.g. https://api.example.com/api/v1)'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Debug APK
        run: gradle assembleDebug -PAPI_BASE_URL="${{ github.event.inputs.api_base_url || vars.API_BASE_URL || 'http://10.0.2.2:8080/api/v1' }}"
        env:
          API_BASE_URL: ${{ github.event.inputs.api_base_url || vars.API_BASE_URL || 'http://10.0.2.2:8080/api/v1' }}

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: payroll-debug-apk
          path: app/build/outputs/apk/debug/*.apk

      - name: Get version info
        id: info
        run: |
          VERSION="1.0.0-$(echo ${{ github.sha }} | cut -c1-7)"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "date=$(date +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.info.outputs.version }}
          name: Payroll Android v${{ steps.info.outputs.version }}
          body: |
            Build from commit ${{ github.sha }}
            Date: ${{ steps.info.outputs.date }}
            API: ${{ github.event.inputs.api_base_url || vars.API_BASE_URL || 'http://10.0.2.2:8080/api/v1' }}

            ## Cài đặt
            1. Tải file APK bên dưới
            2. Mở trên điện thoại Android
            3. Cho phép cài đặt từ nguồn không xác định
            4. Cài đặt và sử dụng
          files: app/build/outputs/apk/debug/*.apk
          draft: false
          prerelease: false
